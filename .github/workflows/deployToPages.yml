name: "🚀 Deploy Next.js to Pages"
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🏗️ Build production
        env:
          NEXT_PUBLIC_SITE_APP_VERSION: "v0.0.${{ github.run_number }}"
        run: npm run build
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
  release_notes:
    runs-on: ubuntu-latest
    outputs:
      artifact_path: dist/artifacts
    steps:
      - uses: actions/checkout@v4
      - name: 🗒️ Generating release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/artifacts
          gh pr list \
            --state merged \
            --limit 20 \
            --json title,mergedAt \
            > dist/artifacts/release-notes.json
      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/artifacts
  deploy:
    needs: [build, release_notes]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
