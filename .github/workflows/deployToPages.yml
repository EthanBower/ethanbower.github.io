name: "🚀 Deploy Next.js to Pages"
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
      - name: 🗒️ Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p public
          gh pr list \
            --state merged \
            --limit 20 \
            --json title,mergedAt \
            > public/release-notes.json
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🏗️ Build production
        env:
          NEXT_PUBLIC_SITE_APP_VERSION: "v0.0.${{ github.run_number }}"
        run: npm run build
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
